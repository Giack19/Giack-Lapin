<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapin Greisch</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
            line-height: 1.4;
        }

        fieldset {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        legend {
            font-weight: bold;
            padding: 0 8px;
        }

        .form-group {
            margin-top: 8px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary {
            background: #005bbb;
            color: white;
            border: none;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #successMessage {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border: 1px solid #81c784;
            color: #1b5e20;
        }

        #errorMessage {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #b71c1c;
        }
    </style>
</head>
<body>

    <h2>Lapin Greisch</h2>
    <p>Complète le formulaire puis clique sur Envoyer.</p>

    <!-- iframe caché pour recevoir la soumission -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <form
        action="https://docs.google.com/forms/d/e/1FAIpQLSew8SvbJvm_0s3uCjy5z-FE9y-23AYxBdzVMtvgOS5isXohzQ/formResponse"
        target="hidden_iframe"
        id="bootstrapForm"
        method="POST"
    >
        <fieldset>
            <legend>Nom / Prénom</legend>
            <div class="form-group">
                <input id="906526724" type="text" name="entry.906526724" class="form-control" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Entreprise</legend>
            <div class="form-group">
                <input id="713564856" type="text" name="entry.713564856" class="form-control" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Combien y a-t-il d’œufs ?</legend>
            <div class="form-group">
                <input id="1419041304" type="text" name="entry.1419041304" class="form-control" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Quel est le poids total des œufs (en grammes) ?</legend>
            <div class="form-group">
                <input id="403807101" type="text" name="entry.403807101" class="form-control" required>
            </div>
        </fieldset>

        <input type="hidden" name="fvv" value="1">
        <input type="hidden" name="fbzx" value="1192076355161610563">
        <input type="hidden" name="pageHistory" value="0">

        <input class="btn btn-primary" id="submitBtn" type="submit" value="Envoyer">
    </form>

    <div id="successMessage">
        Merci, votre réponse a été envoyée.
    </div>

    <div id="errorMessage">
        La soumission semble avoir échoué. Réessayez dans un navigateur classique.
    </div>

    <script>
        (function () {
            const form = document.getElementById('bootstrapForm');
            const submitBtn = document.getElementById('submitBtn');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            let submitted = false;

            form.addEventListener('submit', function () {
                submitted = true;
                submitBtn.disabled = true;
                submitBtn.value = 'Envoi en cours...';

                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                // On affiche un succès "optimiste" après un court délai
                // car Google Forms ne renvoie pas une réponse exploitable facilement ici.
                setTimeout(function () {
                    if (submitted) {
                        form.style.display = 'none';
                        successMessage.style.display = 'block';
                    }
                }, 1500);

                // Réactivation de secours
                setTimeout(function () {
                    submitBtn.disabled = false;
                    submitBtn.value = 'Envoyer';
                }, 4000);
            });

            window.addEventListener('error', function () {
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.value = 'Envoyer';
            });
        })();
    </script>

</body>
</html>
